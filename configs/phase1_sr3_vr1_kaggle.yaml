inherits: "configs/base.yaml"

project:
  group: "vR.1-sr3"
  tags:
    - vR.1
    - scratch
    - kaggle
    - sr3

tracking:
  mode: "offline"
  notes: "vR.1 scratch SR3 Kaggle baseline"

dataset:
  family: kaggle
  name: kaggle_4x
  pairing_mode: paired
  scale_factor: 4

data:
  patch_size: 64
  batch_size: 4
  num_workers: 0
  val_limit: 16

model:
  kind: sr3
  model_channels: 32

training:
  epochs: 6
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  max_train_batches: null
  max_val_batches: 8
  checkpoint_name: "vR.1_sr3_best.pt"

diffusion:
  num_timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 0.02
  inference_steps: 10

evaluation:
  sample_limit: 8
  save_limit: 8
  grid_name: "vR.1_sr3_grid.png"
